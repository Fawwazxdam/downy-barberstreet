name: Deploy Astro to VPS

on:
  push:
    branches:
      - main # Trigger berjalan saat ada push ke branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Sesuaikan dengan versi Node.js yang kamu pakai

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: "/home/magentaadam/projects/downybarberstreet"
          strip_components: 1 # Menghilangkan folder induk 'dist', hanya isinya yang dikirim